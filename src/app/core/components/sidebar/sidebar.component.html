<aside class="glass-sidebar">
  <div class="sidebar-section">
    <h3 class="section-title">Menu</h3>
    <ul class="sidebar-menu">
      <li>
        <a routerLink="/portfolio" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
          <span class="menu-icon">
            <svg viewBox="0 0 24 24" width="18" height="18">
              <path fill="currentColor" d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-9 14H7v-7h3v7zm4 0h-3V7h3v10zm4 0h-3v-4h3v4z"/>
            </svg>
          </span>
          Dashboard
        </a>
      </li>
    </ul>
  </div>

  <div class="sidebar-section market-info-section">
    <h3 class="section-title">Market Status</h3>
    <div class="market-card glass-panel">
      <div class="market-header">
        <span class="pulse-dot"></span>
        <span class="market-name">NYSE / NASDAQ</span>
      </div>
      <div class="market-time">Simulated Live</div>
      <div class="market-note">Updates: Every 5s</div>
    </div>
  </div>
</aside>
